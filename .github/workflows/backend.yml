name: Backend CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'omni-backend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'omni-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./omni-backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: omnireads
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run lint
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run tests
      run: pytest
      env:
        DATABASE_URL: postgres://postgres:password@localhost:5432/omnireads
        SECRET_KEY: testing-secret-key
        DEBUG: True
